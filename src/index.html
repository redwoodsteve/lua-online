<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="editor.css">
    </head>
    <body>
        <div class="resize-detector"></div>
        <main>
            <div class="sidebar">
                <div>
                    Files
                    <button id="new-file-btn">+</button>
                    <button id="new-folder-btn">+f</button>
                    <button id="upload-file-btn">Upload</button>
                </div>
                <div id="explorer">
                    <!--<div>main.lua</div>-->
                </div>
            </div>
            <div class="editor">
                <div class="editor-topbar">
                    <div id="topbar-openfile"></div>
                    <div id="topbar-savestatus"></div>
                    <button id="upload-archive-btn">Upload archive</button>
                </div>
                <div id="editor"></div>
            </div>
            <div class="editor-resizer"></div>
            <div class="output-panel">
                <div class="run-topbar">
                    <button type="button" id="start-button">Start</button>
                    <button type="button" id="stop-button">Stop</button>
                </div>
                <iframe class="canvas" id="canvas"></iframe>
                <div class="terminal">
                    
                </div>
            </div>
            <div class="notifications">
            </div>
        </main>
        <script src="editor.ts" type="module"></script>
    </body>
</html>
